name: CI
on:
  pull_request:

jobs:
  checks:
    env:
      NUXT_PRETALX_API_TOKEN: ${{ secrets.NUXT_PRETALX_API_TOKEN }}
      NUXT_PRETALX_API_URL: ${{ secrets.NUXT_PRETALX_API_URL }}
      NUXT_GOOGLE_SHEET_ID: ${{ secrets.NUXT_GOOGLE_SHEET_ID }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm build
        env:
          NODE_OPTIONS: --max-old-space-size=8192
